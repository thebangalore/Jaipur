<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rajasthan Sourcing Trip</title>
<style>
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f3f4f6;
    --color-text-primary: #111827;
    --color-text-secondary: #4b5563;
    --color-border-primary: #111827;
    --color-border-secondary: #e5e7eb;
    --color-border-tertiary: #f3f4f6;
    --border-radius-md: 6px;
    --font-sans: system-ui, -apple-system, sans-serif;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-background-primary); -webkit-font-smoothing: antialiased; }
  
  .wrap { padding: 16px; font-family: var(--font-sans); max-width: 100%; overflow-x: hidden; }
  
  /* Mobile-first scrollable tabs */
  .tabs { 
    display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 16px;
    -ms-overflow-style: none; scrollbar-width: none; white-space: nowrap;
  }
  .tabs::-webkit-scrollbar { display: none; }
  
  .tab { 
    padding: 8px 16px; border: 1px solid var(--color-border-secondary); 
    border-radius: 20px; font-size: 13.5px; cursor: pointer; 
    background: var(--color-background-primary); color: var(--color-text-secondary); 
    font-family: var(--font-sans); flex-shrink: 0; transition: all 0.2s;
  }
  .tab.active { 
    background: var(--color-border-primary); color: #fff; 
    border-color: var(--color-border-primary); font-weight: 500; 
  }
  
  .day { display: none; animation: fadeIn 0.3s ease; }
  .day.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  
  .dhead { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--color-border-tertiary); }
  .dtitle { font-size: 20px; font-weight: 600; color: var(--color-text-primary); line-height: 1.3; }
  .dsub { font-size: 14px; color: var(--color-text-secondary); margin-top: 4px; }
  
  .dnote { 
    font-size: 13px; margin-top: 10px; display: inline-block; padding: 6px 12px; 
    border-radius: var(--border-radius-md); font-weight: 500; width: 100%;
  }
  .dnote.warn { background: #FCEBEB; color: #A32D2D; }
  .dnote.info { background: #E6F1FB; color: #185FA5; }
  
  /* Adjusted timeline for mobile screens */
  .tl { padding-left: 56px; position: relative; margin-top: 10px; }
  .slot { position: relative; display: flex; margin-bottom: 0; min-height: 60px; }
  
  .tc { position: absolute; left: -56px; width: 48px; text-align: right; padding-top: 2px; }
  .tm { font-size: 12px; font-weight: 600; color: var(--color-text-secondary); font-variant-numeric: tabular-nums; }
  
  .dc { position: absolute; left: -2px; display: flex; flex-direction: column; align-items: center; top: 0; bottom: 0; }
  .dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.1); }
  .line { width: 2px; flex: 1; background: var(--color-border-tertiary); margin-top: 4px; }
  .slot:last-child .line { display: none; }
  
  .cc { padding: 0 0 24px 16px; flex: 1; }
  .act { font-size: 15px; font-weight: 600; color: var(--color-text-primary); line-height: 1.3; }
  .nt { font-size: 13.5px; color: var(--color-text-secondary); margin-top: 4px; line-height: 1.5; }
  
  .tg { 
    display: inline-block; font-size: 11px; padding: 3px 8px; 
    border-radius: var(--border-radius-md); margin-top: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;
  }
  
  .tg-f { background: #FAEEDA; color: #854F0B; }
  .tg-s { background: #E6F1FB; color: #185FA5; }
  .tg-c { background: #EEEDFE; color: #534AB7; }
  .tg-x { background: #E1F5EE; color: #0F6E56; }
  .tg-r { background: #FAECE7; color: #993C1D; }
  .tg-t { background: #F1EFE8; color: #5F5E5A; }
  .tg-w { background: #FCEBEB; color: #A32D2D; }
  
  .dot-f { background: #EF9F27; }
  .dot-s { background: #378ADD; }
  .dot-c { background: #7F77DD; }
  .dot-x { background: #1D9E75; }
  .dot-r { background: #D85A30; }
  .dot-t { background: #888780; }
  .dot-w { background: #E24B4A; }
</style>
</head>
<body>

<div class="wrap">
  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>
</div>

<script>
const days = [
{id:'d1', label:'Apr 3', title:'Day 1: Udaipur', sub:'Arrival + Royal + Sunset', note:'Land 10:30 AM · Taxi ~20 min (~₹400)', ntype:'info', slots:[
  {t:'10:30', a:'Land at Udaipur Airport', n:'', tag:'t'},
  {t:'11:15', a:'Hotel check-in', n:'Stay near Lake Pichola for best access.', tag:'t'},
  {t:'12:00', a:'Lunch', n:'Cafe Edelweiss / Millets of Mewar. Keep it light.', tag:'f'},
  {t:'13:15', a:'Jagdish Temple', n:'40–45 min. Peaceful afternoon visit.', tag:'s'},
  {t:'14:15', a:'City Palace', n:'2 hours. Don’t miss textile & costume section.', tag:'s'},
  {t:'16:15', a:'Boat to Jagmandir', n:'~₹600. 30 min ride + 45 min island + return.', tag:'s'},
  {t:'18:00', a:'Karni Mata Ropeway', n:'Best sunset in Udaipur. Closes 8 PM.', tag:'r'},
  {t:'19:15', a:'Doodh Talai fountain', n:'20 min chill by the water.', tag:'s'},
  {t:'20:30', a:'Dinner at Qalaa', n:'Rooftop, palace view.', tag:'f'},
]},

{id:'d2', label:'Apr 4', title:'Day 2: Udaipur', sub:'Sunrise + Culture + Print Sourcing Exposure', note:'Buy Dharohar tickets by 4:00 PM', ntype:'warn', slots:[
  {t:'05:15', a:'Wake up', n:'Early start for the hike.', tag:'t'},
  {t:'05:30', a:'Leave for Bahubali Hills', n:'35–40 min drive.', tag:'t'},
  {t:'06:10', a:'Sunrise at Bahubali Hills', n:'15 min hike. Top-tier view over the lakes.', tag:'r'},
  {t:'07:15', a:'Return drive', n:'', tag:'t'},
  {t:'08:15', a:'Breakfast', n:'Cafe Nirvana / Savage Garden.', tag:'f'},
  {t:'10:00', a:'Old City + Hathipole Market', n:'Light browsing (prints, patterns) to gauge local styles.', tag:'s'},
  {t:'12:00', a:'Lunch + Rest', n:'Mandatory downtime to avoid peak heat.', tag:'f'},
  {t:'15:30', a:'Bagore Ki Haveli', n:'1.5 hrs. Strong textiles + heritage reference.', tag:'s'},
  {t:'16:00', a:'BUY Dharohar ticket', n:'Crucial: Show sells out fast, secure seats now.', tag:'w'},
  {t:'17:45', a:'Walk to Ambrai Ghat', n:'', tag:'t'},
  {t:'18:00', a:'Sunset at Ambrai Ghat', n:'Best view of City Palace reflecting on the lake.', tag:'r'},
  {t:'19:00', a:'Dharohar Cultural Show', n:'Ghoomar, Kalbelia dances (90 min).', tag:'c'},
  {t:'20:30', a:'Dinner', n:'Ambrai or Upre (book ahead).', tag:'f'},
]},

{id:'d3', label:'Apr 5', title:'Day 3: Travel via Ajmer', sub:'Udaipur → Ajmer/Pushkar → Jaipur', note:'Heavy travel day (~8 hrs driving) · Focus on resting tonight', ntype:'info', slots:[
  {t:'06:00', a:'Leave Udaipur early', n:'Beat the morning traffic.', tag:'t'},
  {t:'08:30', a:'Breakfast stop', n:'Highway dhaba near Chittorgarh.', tag:'f'},
  {t:'11:30', a:'Arrive in Ajmer', n:'Quick stop at Ajmer Sharif Dargah. Warning: Can be very crowded.', tag:'c'},
  {t:'13:00', a:'Drive to Pushkar', n:'Short 30 min hop over the Nag Pahar hills.', tag:'t'},
  {t:'13:30', a:'Lunch + Pushkar Walk', n:'Grab lunch and take a quick 45-min walk by Pushkar Lake and Brahma Temple.', tag:'s'},
  {t:'15:00', a:'Drive to Jaipur', n:'Final ~3 hour stretch to the Pink City.', tag:'t'},
  {t:'18:00', a:'Reach Jaipur + Check-in', n:'Drop bags and freshen up. Do NOT plan heavy activities.', tag:'t'},
  {t:'19:00', a:'Light exploration + Vendor Prep', n:'Walk local bazaars for vibe check. **Important Upgrade:** Call/WhatsApp 2-3 Sanganer vendors to lock in visits for tomorrow.', tag:'x'},
  {t:'20:30', a:'Relaxed Dinner', n:'Peacock Rooftop or nearby chill spot. Sleep early.', tag:'f'},
]},

{id:'d4', label:'Apr 6', title:'Day 4: Jaipur Sourcing', sub:'Core Business Execution Day', note:'Sanganer is the most important block of the trip', ntype:'warn', slots:[
  {t:'05:30', a:'Optional sunrise (Nahargarh)', n:'Skip if tired. Sleep > sunrise today.', tag:'r'},
  {t:'08:30', a:'Breakfast', n:'Fuel up for a heavy work day.', tag:'f'},
  {t:'09:30', a:'Leave for Bagru', n:'About an hour drive west of Jaipur.', tag:'t'},
  {t:'10:30', a:'Bagru Block Print Village', n:'1.5–2 hrs. Focus on Dabu printing, natural dyes, and unique artisan-level pieces.', tag:'x'},
  {t:'12:30', a:'Head back toward city', n:'', tag:'t'},
  {t:'13:30', a:'Quick Lunch', n:'Keep it efficient.', tag:'f'},
  {t:'14:30', a:'Leave for Sanganer', n:'Drive to the southern textile hub.', tag:'t'},
  {t:'15:00', a:'SANGANER (CORE WORK)', n:'Block minimum 4 hours. Focus deeply on cotton kurti fabrics, screen print units, bulk pricing, and vendor shortlisting.', tag:'x'},
  {t:'19:30', a:'Chokhi Dhani', n:'Relax + dinner + folk dance. Right near Sanganer.', tag:'c'},
  {t:'22:30', a:'Back to hotel', n:'', tag:'t'},
]},

{id:'d5', label:'Apr 7', title:'Day 5: Jaipur Sights', sub:'Architecture + Design Inspiration', note:'Heritage circuit mapped for optimal lighting', ntype:'info', slots:[
  {t:'06:00', a:'Sunrise at Nahargarh', n:'Panoramic views of the Pink City.', tag:'r'},
  {t:'08:00', a:'Breakfast', n:'Roastery Coffee House.', tag:'f'},
  {t:'09:00', a:'Hawa Mahal', n:'Best lighting is right as it opens.', tag:'s'},
  {t:'09:45', a:'Tattoo Cafe', n:'View + coffee right opposite Hawa Mahal.', tag:'f'},
  {t:'10:30', a:'Jantar Mantar', n:'Massive astronomical instruments.', tag:'s'},
  {t:'11:45', a:'City Palace', n:'Focus on the textile section again for inspiration.', tag:'s'},
  {t:'13:00', a:'Lunch', n:'Blue Door Cafe.', tag:'f'},
  {t:'14:00', a:'Rest', n:'Midday heat avoidance.', tag:'t'},
  {t:'16:00', a:'Amber Fort', n:'Late afternoon visit to avoid crowds and heat.', tag:'s'},
  {t:'18:15', a:'Jal Mahal', n:'Sunset views of the water palace.', tag:'r'},
  {t:'20:00', a:'Dinner', n:'Final major night.', tag:'f'},
]},

{id:'d6', label:'Apr 8', title:'Day 6: Departure', sub:'Fly 12:00 PM', note:'Reach airport by 10:00 AM latest', ntype:'warn', slots:[
  {t:'07:00', a:'Hotel checkout', n:'Move light for the last few hours.', tag:'t'},
  {t:'07:30', a:'Lassiwala', n:'One last thick creamy lassi before the airport. Non-negotiable.', tag:'w'},
  {t:'08:15', a:'Coffee / Albert Hall', n:'Farewell coffee or a quick photo stop.', tag:'f'},
  {t:'09:30', a:'Head to Airport', n:'15–20 min from city centre.', tag:'t'},
  {t:'10:00', a:'Airport — check in', n:'Domestic security is usually smooth.', tag:'t'},
  {t:'12:00', a:'Flight departs', n:'Trip complete.', tag:'t'},
]},
];

const tabEl = document.getElementById('tabs');
const panelEl = document.getElementById('panels');

const tagLabel = {f:'Food', s:'Sightseeing', c:'Culture', x:'Sourcing', r:'Sunrise/Sunset', t:'Transit', w:'Critical'};

days.forEach((d, i) => {
  const tab = document.createElement('button');
  tab.className = 'tab' + (i === 0 ? ' active' : '');
  tab.textContent = d.label;
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.day').forEach(x => x.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(d.id).classList.add('active');
    
    // Smooth scroll tabs to center active item on mobile
    tab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  };
  tabEl.appendChild(tab);

  const panel = document.createElement('div');
  panel.className = 'day' + (i === 0 ? ' active' : '');
  panel.id = d.id;

  const noteHtml = `<span class="dnote ${d.ntype}">${d.note}</span>`;
  let html = `<div class="dhead"><div class="dtitle">${d.title}</div><div class="dsub">${d.sub}</div>${noteHtml}</div><div class="tl">`;

  d.slots.forEach(s => {
    html += `<div class="slot">
      <div class="tc"><span class="tm">${s.t}</span></div>
      <div class="dc"><div class="dot dot-${s.tag}"></div><div class="line"></div></div>
      <div class="cc">
        <div class="act">${s.a}</div>
        ${s.n ? `<div class="nt">${s.n}</div>` : ''}
        <span class="tg tg-${s.tag}">${tagLabel[s.tag]}</span>
      </div>
    </div>`;
  });

  html += '</div>';
  panel.innerHTML = html;
  panelEl.appendChild(panel);
});
</script>

</body>
</html>
